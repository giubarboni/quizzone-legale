<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080259;
      --bg-hover: #060247;
      --surface: #1A1566;
      --white: #FFFFFF;
      --white60: rgba(255,255,255,0.6);
      --white20: rgba(255,255,255,0.2);
      --white10: rgba(255,255,255,0.1);
      --green: #3DD68C;
      --red: #FF6B6B;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding: 0;
    }

    /* ── Header ── */
    .q-header {
      padding: 24px 20px 16px;
      flex-shrink: 0;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .progress-meta span {
      font-size: 12px;
      color: var(--white60);
    }
    .bar-track {
      height: 3px;
      background: var(--white10);
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      background: var(--white);
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    /* ── Question body ── */
    .q-body {
      flex: 1;
      padding: 24px 20px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .q-number {
      font-size: 12px;
      color: var(--white60);
      margin-bottom: 6px;
    }
    .q-text {
      font-size: 20px;
      font-weight: 500;
      color: var(--white);
      line-height: 1.5;
    }

    /* ── Answers ── */
    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .ans-btn {
      width: 100%;
      text-align: left;
      padding: 14px 16px;
      border-radius: 14px;
      border: 2px solid transparent;
      background: var(--surface);
      font-size: 15px;
      color: var(--white);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      line-height: 1.4;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .ans-btn:hover:not(:disabled) { background: var(--bg-hover); }
    .ans-btn:active:not(:disabled) { background: var(--bg-hover); }
    .ans-btn:disabled { cursor: default; }
    .ans-btn.selected { border: 2px solid var(--white); background: var(--surface); }

    .ans-btn.result-correct { border-color: var(--green); background: rgba(61,214,140,0.12); }
    .ans-btn.result-correct .letter-circle { background: var(--green); color: #080259; border-color: var(--green); }
    .ans-btn.result-wrong { border-color: var(--red); background: rgba(255,107,107,0.10); }
    .ans-btn.result-wrong .letter-circle { background: var(--red); color: #fff; border-color: var(--red); }

    .letter-circle {
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1.5px solid var(--white20);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: var(--white60);
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .ans-btn.selected .letter-circle { border-color: var(--white); color: var(--white); }

    /* ── Next button ── */
    .next-btn {
      margin-top: auto;
      width: 100%;
      padding: 16px;
      background: var(--white);
      color: var(--bg);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: none;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .next-btn:hover { opacity: 0.88; }
    .next-btn:active { opacity: 0.75; }

    /* ── Result screen ── */
    #result-view {
      display: none;
      flex: 1;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 40px;
      text-align: center;
      gap: 0;
    }
    .result-icon { font-size: 60px; margin-bottom: 24px; }
    .result-pts { font-size: 64px; font-weight: 500; color: var(--white); line-height: 1; }
    .result-pts-sub { font-size: 14px; color: var(--white60); margin: 8px 0 28px; }
    .result-card {
      background: var(--surface);
      border-radius: 16px;
      padding: 18px;
      width: 100%;
      margin-bottom: 28px;
      text-align: left;
    }
    .result-title { font-size: 18px; font-weight: 500; color: var(--white); margin-bottom: 6px; }
    .result-desc { font-size: 14px; color: var(--white60); line-height: 1.6; }
    .restart-btn {
      width: 100%;
      margin-top: auto;
      padding: 16px;
      background: var(--white);
      color: var(--bg);
      border: none;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .restart-btn:hover { opacity: 0.88; }
    .restart-btn:active { opacity: 0.75; }

    /* ── Quiz view wrapper ── */
    #quiz-view {
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* ── Cover screen ── */
    #cover-view {
      display: flex;
      flex-direction: column;
      flex: 1;
      align-items: center;
      justify-content: center;
      padding: 40px 32px 88px;
      text-align: center;
      gap: 0;
      position: relative;
      overflow: hidden;
    }
    .cover-bottom {
      position: absolute;
      bottom: 24px;
      left: 32px;
      right: 32px;
      z-index: 1;
    }

    /* halftone dot bg */
    #cover-view::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1.5px, transparent 1.5px);
      background-size: 22px 22px;
      pointer-events: none;
    }

    .cover-bg-icon {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      height: 105vh;
      width: auto;
      opacity: 1;
      pointer-events: none;
      z-index: 0;
    }
    .cover-spacer { flex: 1; position: relative; z-index: 1; }
    .cover-title {
      font-family: 'Bangers', cursive;
      font-size: 112px;
      font-weight: 400;
      line-height: 0.8;
      letter-spacing: 3px;
      color: var(--white);
      -webkit-text-stroke: 2px rgba(0,0,0,0.35);
      paint-order: stroke fill;
      text-shadow: 5px 5px 0 rgba(0,0,0,0.25);
      margin-bottom: 16px;
      position: relative;
    }
    .cover-title .pop {
      color: var(--white);
      -webkit-text-stroke: 2px rgba(0,0,0,0.4);
      display: inline-block;
      transform: rotate(-2deg);
    }
    .cover-powered {
      font-size: 12px;
      color: var(--white60);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 0;
      position: relative;
    }
    .cover-cta {
      width: 100%;
      padding: 16px;
      background: var(--white);
      color: var(--bg);
      border: none;
      border-radius: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
      position: relative;
    }
    .cover-cta:hover { opacity: 0.9; transform: translate(-1px, -1px); box-shadow: 5px 5px 0 rgba(0,0,0,0.3); }
    .cover-cta:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(0,0,0,0.3); }
  </style>
</head>
<body>

  <div id="cover-view">
    <svg class="cover-bg-icon" viewBox="0 0 556 1006" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M70.7663 659.595C70.7663 611.528 77.4424 568.801 90.7945 531.415C105.037 493.139 122.84 459.313 144.203 429.939C165.566 400.564 187.375 375.195 209.629 353.832C243.454 320.896 274.609 291.967 303.094 267.043C331.578 242.119 345.82 219.865 345.82 200.282C345.82 194.941 342.26 187.82 335.139 178.919C328.017 169.127 316.891 164.231 301.758 164.231C285.736 164.231 265.262 170.907 240.338 184.259C215.414 197.612 189.6 214.524 162.896 234.998C136.192 254.581 111.268 275.054 88.1241 296.417L17.3578 132.186C62.7551 91.2396 113.938 59.1944 170.907 36.0508C227.876 12.0169 285.736 0 344.485 0C380.981 0 415.251 5.34084 447.297 16.0225C479.342 26.7042 505.156 44.5071 524.739 69.4311C545.212 94.3551 555.449 128.18 555.449 170.907C555.449 232.327 540.762 283.51 511.387 324.457C482.902 364.513 449.522 398.784 411.246 427.268C371.189 456.643 333.358 488.243 297.753 522.068C263.037 555.894 239.893 596.395 228.322 643.573L70.7663 659.595ZM104.147 1005.42C68.541 1005.42 42.2818 994.734 25.3691 973.371C8.45636 951.117 0 924.858 0 894.593C0 871.449 5.78593 848.751 17.3578 826.497C28.9296 804.244 45.8423 785.551 68.0959 770.418C90.3494 755.286 117.499 747.72 149.544 747.72C198.502 747.72 234.107 758.401 256.361 779.765C279.505 801.128 291.077 825.607 291.077 853.201C291.077 878.125 283.51 902.604 268.378 926.638C254.136 949.782 232.772 968.475 204.288 982.717C176.693 997.85 143.313 1005.42 104.147 1005.42Z" fill="#262178"/>
    </svg>
    <h1 class="cover-title">tu che<br><span class="pop">ne siae</span></h1>
    <p class="cover-powered">powered by Note Legali</p>
    <div class="cover-bottom">
      <button class="cover-cta" onclick="startQuiz()">Inizia il quiz →</button>
    </div>
  </div>

  <div id="quiz-view" style="display:none">
    <div class="q-header">
      <div class="progress-meta">
        <span id="prog-label">1 di 5</span>
        <span id="prog-pct">20%</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" id="bar" style="width: 20%"></div>
      </div>
    </div>
    <div class="q-body">
      <div>
<p class="q-text" id="q-text"></p>
      </div>
      <div class="answers" id="answers"></div>
      <button class="next-btn" id="next-btn">Continua →</button>
    </div>
  </div>

  <div id="result-view">
    <div class="result-icon" id="r-icon"></div>
    <div class="result-pts" id="r-pts"></div>
    <p class="result-pts-sub" id="r-sub"></p>
    <div class="result-card">
      <p class="result-title" id="r-title"></p>
      <p class="result-desc" id="r-desc"></p>
    </div>
    <button class="restart-btn" onclick="restart()">Riprova ↺</button>
  </div>

  <script>
    const Qs = [
      {
        text: "Ma questa SIAE poi, che cos'è?",
        answers: [
          "Un ente pubblico a cui ci si può associare liberamente, autorizzato a gestire i diritti degli autori",
          "Un ente pubblico al quale è obbligatorio iscriversi per potere pubblicare la propria musica",
          "Un nemico del popolo",
          "Un'istituzione dello Stato che ha il compito di raccogliere la tassa sulle utilizzazioni di prodotti culturali"
        ],
        correct: 0
      },
      {
        text: "Cosa succede se firmo un contratto discografico con un'etichetta?",
        answers: [
          "Tutti i profitti della mia musica andranno a loro",
          "Tutti i profitti, ma anche le responsabilità morali, andranno a loro",
          "L'etichetta sarà incaricata di depositare la mia musica in SIAE",
          "La mia anima sarà venduta al diavolo e l'unico modo per riscattarla è incidere un album di platino"
        ],
        correct: 0
      },
      {
        text: "In quanto artista, musicista, creatore di contenuti, il diritto d'autore mi tutela. Questo vuol dire che:",
        answers: [
          "Nessuno può fare opere nate dalla mia stessa idea (es: che bella Falconara Marittima)",
          "Nessuno può fare opere uguali alle mie (es: un ritornello che dice \"falconara best place on earth, su un giro di DO\")",
          "Nessuno può più fare musica neo-melodica",
          "Devo correre in SIAE: solo le opere depositate sono protette"
        ],
        correct: 1
      },
      {
        text: "A proposito, come faccio a essere tutelato dal diritto d'autore?",
        answers: [
          "Devo inviare una raccomandata A/R con marca da bollo da 16 euro a Carlo Conti",
          "Devo depositare una copia fisica o digitale in SIAE",
          "Devo fissare la mia opera su un supporto materiale",
          "Nulla, basta che la mia opera possa essere considerata originale e creativa"
        ],
        correct: 3
      },
      {
        text: "Per quanto tempo mi spettano i profitti per la mia musica?",
        answers: [
          "70 anni dalla pubblicazione dell'opera",
          "70 anni dalla mia morte (l'autore) o, in caso di più autori, dalla morte dell'ultimo di essi",
          "70 anni, a meno che l'autore non sia Gianni Morandi, nel qual caso è prevista l'immortalità giuridica dell'opera",
          "50 anni dalla firma del contratto discografico col produttore"
        ],
        correct: 1
      }
    ];

    const Results = [
      { icon: "😅", title: "Congratulazioni!", desc: "È quello che direi se ne avessi azzeccata almeno una. Fammi indovinare: per te il diritto d'autore è un colpo di tennis, vero?" },
      { icon: "🤔", title: "Ci siamo quasi!", desc: "Una scintilla di speranza. Queste domande ti hanno messo in difficoltà ma hai comunque conquistato un punto. Daje forte!" },
      { icon: "👌", title: "Non male!", desc: "2 su 5, sei a metà strada: qualche lacuna da colmare, ma stai andando nella direzione giusta." },
      { icon: "💪", title: "Bel risultato!", desc: "Sei sopra la media, non solo nelle birre. Secondo me però possiamo ancora esserti utili." },
      { icon: "🔥", title: "Ottimo!", desc: "Quasi perfetto! Che dire, sai quasi tutto del diritto d'autore. Magari non la prima cosa che racconti di te a una festa ma insomma, buttalo via." },
      { icon: "🏆", title: "Si vabbè", desc: "Punteggio pieno, chi sei il mio avvocato? Fabrizio se sei tu guarda che non è divertente." }
    ];

    let cur = 0, score = 0, selected = null;

    function startQuiz() {
      document.getElementById('cover-view').style.display = 'none';
      document.getElementById('quiz-view').style.display = 'flex';
      render();
    }

    function render() {
      const q = Qs[cur];
      const pct = Math.round((cur + 1) / Qs.length * 100);
      document.getElementById('prog-label').textContent = (cur + 1) + ' di ' + Qs.length;
      document.getElementById('prog-pct').textContent = pct + '%';
      document.getElementById('bar').style.width = pct + '%';
      document.getElementById('q-text').textContent = q.text;
      document.getElementById('next-btn').style.display = 'none';
      selected = null;

      const container = document.getElementById('answers');
      container.innerHTML = '';
      ['A', 'B', 'C', 'D'].forEach((l, i) => {
        const btn = document.createElement('button');
        btn.className = 'ans-btn';
        btn.innerHTML = '<span class="letter-circle">' + l + '</span><span>' + q.answers[i] + '</span>';
        btn.onclick = () => pick(i);
        container.appendChild(btn);
      });
    }

    function pick(idx) {
      if (selected !== null) return;
      selected = idx;
      document.querySelectorAll('.ans-btn').forEach(b => b.disabled = true);
      document.querySelectorAll('.ans-btn')[idx].classList.add('selected');
      if (idx === Qs[cur].correct) score++;
      const nb = document.getElementById('next-btn');
      nb.style.display = 'block';
      nb.textContent = cur < Qs.length - 1 ? 'Continua →' : 'Vedi il risultato →';
    }

    document.getElementById('next-btn').onclick = function () {
      cur++;
      if (cur < Qs.length) render();
      else showResult();
    };

    function showResult() {
      document.getElementById('quiz-view').style.display = 'none';
      const rv = document.getElementById('result-view');
      rv.style.display = 'flex';
      const r = Results[score];
      document.getElementById('r-icon').textContent = r.icon;
      document.getElementById('r-pts').textContent = score + '/5';
      document.getElementById('r-sub').textContent = score === 1 ? '1 risposta corretta' : score + ' risposte corrette';
      document.getElementById('r-title').textContent = r.title;
      document.getElementById('r-desc').textContent = r.desc;
    }

    function restart() {
      cur = 0; score = 0; selected = null;
      document.getElementById('result-view').style.display = 'none';
      document.getElementById('cover-view').style.display = 'flex';
    }
  </script>
</body>
</html>
